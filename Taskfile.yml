version: '3'

dotenv:
  - infra/Taskfile.env

vars:
  ENV_FILE: infra/Taskfile.env
  INFRA_COMPOSE: infra/docker-compose.infra.yml
  APP_COMPOSE: deploy/compose/docker-compose.app.yml
  API_TEMPLATE: k8s/helm/webapi-chart/values.template.yaml
  WEB_TEMPLATE: k8s/helm/webapp-chart/values.template.yaml

tasks:
  infra:up:
    desc: Start MongoDB container
    cmds:
      - docker compose -f {{.INFRA_COMPOSE}} --env-file {{.ENV_FILE}} up -d

  infra:down:
    desc: Stop MongoDB container
    cmds:
      - docker compose -f {{.INFRA_COMPOSE}} down

  run:local:
    desc: Run full stack locally in parallel
    deps:
      - infra:up
      - run:local:api
      - run:local:web

  run:local:api:
    internal: true
    dir: src/WebApi
    cmds:
      - dotnet watch run --urls "http://localhost:{{.WEBAPI_HOST_PORT}}"
    env:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Mongo: "mongodb://{{.MONGO_USER}}:{{.MONGO_PASSWORD}}@{{.MONGO_HOST_LOCAL}}:{{.MONGO_PORT}}/admin?authSource=admin"

  run:local:web:
    internal: true
    dir: src/WebApp
    cmds:
      - npm install
      - npm run dev -- --port {{.WEBAPP_HOST_PORT | default "3000"}}
    env:
      VITE_API_URL: "{{.VITE_API_URL}}"

  run:docker:
    desc: Run the stack using Docker Compose
    cmds:
      - docker compose -f {{.APP_COMPOSE}} --env-file {{.ENV_FILE}} up --build -d

  run:k8s:
    desc: Deploy to Kubernetes via Helm
    deps:
      - gen:k8s-values
    cmds:
      - helm upgrade --install webapi k8s/helm/webapi-chart -f k8s/helm/webapi-chart/values.dev.yaml
      - helm upgrade --install webapp k8s/helm/webapp-chart -f k8s/helm/webapp-chart/values.dev.yaml

  gen:k8s-values:
    internal: true
    cmds:
      - envsubst < {{.API_TEMPLATE}} > k8s/helm/webapi-chart/values.dev.yaml
      - envsubst < {{.WEB_TEMPLATE}} > k8s/helm/webapp-chart/values.dev.yaml